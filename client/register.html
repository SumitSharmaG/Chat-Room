<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Private Chat Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --wood-accent-deep: #1e1410;
            --accent-gold: #b59461;
            --text-main: #e0e0e0;
            --text-muted: #999999;
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(10, 10, 10, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Register Card --- */
        .register-card {
            background-color: var(--bg-card);
            background-image: linear-gradient(145deg, var(--bg-card) 0%, var(--wood-accent-deep) 100%);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(181, 148, 97, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        .desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* --- Form Styling --- */
        #registerForm {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(181, 148, 97, 0.2);
            padding: 14px 18px;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(181, 148, 97, 0.1);
        }

        input::placeholder {
            color: #555;
        }

        button {
            background-color: var(--accent-gold);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(181, 148, 97, 0.3);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* --- Footer Link --- */
        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .footer-text a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* Mobile Fixes */
        @media (max-width: 480px) {
            .register-card { padding: 30px 20px; }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <script>
        const user = localStorage.getItem("username");
        if (user) {
            window.location.href = "chat.html";
        }
    </script>

    <div class="register-card">
        <h2>Register</h2>
        <p class="desc">Join our premium private network</p>

        <form id="registerForm">
            <input type="text" id="username" placeholder="Choose Username" required autocomplete="username" />
            <input type="password" id="password" placeholder="Create Password" required autocomplete="new-password" />
            <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script src="script.js"></script>

</body>
  </html>
