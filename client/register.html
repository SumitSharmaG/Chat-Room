<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Private Chat Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --wood-accent-deep: #1e1410;
            --accent-gold: #b59461;
            --text-main: #e0e0e0;
            --text-muted: #999999;
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(10, 10, 10, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Home Button Styling --- */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            text-decoration: none;
            color: var(--accent-gold);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border: 1px solid rgba(181, 148, 97, 0.3);
            border-radius: 50px;
            background: rgba(20, 20, 20, 0.5);
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .home-btn:hover {
            background: var(--accent-gold);
            color: #000;
            transform: scale(1.05);
        }

        /* --- Register Card --- */
        .register-card {
            background-color: var(--bg-card);
            background-image: linear-gradient(145deg, var(--bg-card) 0%, var(--wood-accent-deep) 100%);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(181, 148, 97, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        .desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        #registerForm {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(181, 148, 97, 0.2);
            padding: 14px 18px;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(181, 148, 97, 0.1);
        }

        button {
            background-color: var(--accent-gold);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(181, 148, 97, 0.3);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .reg-note {
            margin-top: 25px;
            font-size: 0.75rem;
            color: var(--accent-gold);
            line-height: 1.5;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #000000; 
            background: rgba(0, 0, 0, 0.2);
            font-style: italic;
            text-align: center;
        }

        @media (max-width: 480px) {
            .register-card { padding: 30px 20px; }
            h2 { font-size: 1.8rem; }
            .home-btn { top: 15px; left: 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <a href="https://chat-room-three-pied.vercel.app/" class="home-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Home
    </a>

    <script>
        const user = localStorage.getItem("username");
        if (user) { window.location.href = "chat.html"; }
    </script>

    <div class="register-card">
        <h2>Register</h2>
        <p class="desc">Join our premium private network</p>

        <form id="registerForm">
            <input type="text" id="username" placeholder="Choose Username" required autocomplete="username" />
            <input type="password" id="password" placeholder="Create Password" required autocomplete="new-password" />
            <button type="submit">Create Account</button>
        </form>

        <p class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </p>

        <div class="reg-note">
            <strong>Note :-</strong> When You Click "CREATE ACCOUNT" Please Wait For 7-14 Sec For Connecting the Chat Server
        </div>
    </div>

    <script src="script.js"></script>

</body>
        </html>
