<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --accent-gold: #b59461;
            --text-main: #e0e0e0;
            --transition-smooth: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--bg-card);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(181, 148, 97, 0.2);
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-gold); }

        .logout-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .logout-btn:hover { background: var(--accent-gold); color: #000; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #messages li {
            list-style: none;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px 15px 15px 2px;
            max-width: 80%;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .input-area {
            background: var(--bg-card);
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(181, 148, 97, 0.1);
        }

        #msg {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(181, 148, 97, 0.3);
            padding: 12px 20px;
            border-radius: 30px;
            color: #fff;
            outline: none;
        }

        #msg:focus { border-color: var(--accent-gold); }

        .send-btn {
            background: var(--accent-gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .send-btn:hover { transform: scale(1.1); }

        footer { text-align: center; font-size: 0.7rem; padding: 5px; color: #555; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("username")) {
            window.location.href = "login.html";
        }
    </script>

    <header>
        <h2>Chat Room</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <footer>©2026 SumitSharma.in All Rights Reserved.</footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
  </html>
