<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Chat Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --accent-gold: #b59461;
            --text-main: #e0e0e0;
            --transition-smooth: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            height: 100dvh; /* Dynamic viewport height for mobile keyboard */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed; /* Prevents unwanted scrolling on mobile */
            width: 100%;
        }

        header {
            background: var(--bg-card);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(181, 148, 97, 0.2);
            height: 60px;
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 1.2rem; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--accent-gold);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .logout-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
        }

        .logout-btn:hover { background: var(--accent-gold); color: #000; }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.2);
        }

        #messages li {
            list-style: none;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px 15px 15px 2px;
            max-width: 85%;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        /* --- WhatsApp Style Sticky Input --- */
        .input-area {
            background: var(--bg-card);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(181, 148, 97, 0.1);
            padding-bottom: env(safe-area-inset-bottom, 10px); /* For iPhone notch */
        }

        #msg {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(181, 148, 97, 0.3);
            padding: 12px 18px;
            border-radius: 25px;
            color: #fff;
            outline: none;
            font-size: 1rem;
        }

        #msg:focus { border-color: var(--accent-gold); background: rgba(255,255,255,0.1); }

        .send-btn {
            background: var(--accent-gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        .send-btn:active { transform: scale(0.9); }

        footer { 
            text-align: center; 
            font-size: 0.6rem; 
            padding: 2px; 
            color: #444; 
            background: var(--bg-card);
        }

        /* Desktop View Adjustments */
        @media (min-width: 768px) {
            h2 { font-size: 1.5rem; }
            #messages { padding: 20px 20% ; } /* Side spacing for desktop */
            .input-area { padding: 15px 20%; }
        }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("username")) {
            window.location.href = "login.html";
        }
    </script>

    <header>
        <h2>Chat Room</h2>
        <div class="header-right">
            <div class="online-status">
                <span id="online-icon">👁️</span>
                <span id="online-count">0</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." autocomplete="off" onfocus="scrollToBottom()" />
        <button class="send-btn" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <footer>©2026 SumitSharma.in</footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
    
    <script>
        // Smooth scroll for mobile typing
        function scrollToBottom() {
            setTimeout(() => {
                const msgs = document.getElementById('messages');
                msgs.scrollTop = msgs.scrollHeight;
            }, 300);
        }
    </script>
</body>
</html>
