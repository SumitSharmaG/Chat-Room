<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Ultra Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --accent-gold: #b59461;
            --accent-red: #ff4d4d;
            --text-main: #e0e0e0;
            --bubble-sent: #1e1410;
            --bubble-received: #202020;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%;
        }

        header {
            background: var(--bg-card); padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(181, 148, 97, 0.2); height: 75px;
        }

        /* --- Header Left (Home + Title) --- */
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .home-btn {
            text-decoration: none; 
            font-size: 1.2rem; 
            padding: 5px;
            transition: transform 0.3s ease;
        }
        
        .home-btn:hover { transform: scale(1.2); }

        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }

        .logout-btn, .clear-btn {
            border: 1px solid var(--accent-gold); padding: 4px 10px; border-radius: 5px;
            cursor: pointer; font-size: 0.7rem; font-weight: 600; background: transparent; color: var(--accent-gold);
        }

        .clear-btn { border-color: var(--accent-red); color: var(--accent-red); }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        #messages li {
            list-style: none; padding: 8px 12px; position: relative;
            max-width: 75%; min-width: 80px; width: fit-content;
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }

        .msg-sent {
            align-self: flex-end; background: var(--bubble-sent) !important;
            border-radius: 15px 15px 2px 15px !important; border-right: 2px solid var(--accent-gold) !important;
        }

        .msg-received {
            align-self: flex-start; background: var(--bubble-received) !important;
            border-radius: 15px 15px 15px 2px !important;
        }

        .msg-user { font-size: 0.65rem; color: var(--accent-gold); font-weight: 600; margin-bottom: 2px; }
        .msg-time { font-size: 0.55rem; color: #777; align-self: flex-end; margin-top: 4px; display: flex; gap: 4px; align-items: center; }

        #typing-box {
            padding: 5px 20px; font-size: 0.75rem; color: var(--accent-gold); height: 25px;
            font-style: italic; animation: blink 1.5s infinite; visibility: hidden;
        }
        @keyframes blink { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }

        .input-area {
            background: var(--bg-card); padding: 10px 12px; display: flex; align-items: center; gap: 10px;
            border-top: 1px solid rgba(181, 148, 97, 0.1);
        }

        #msg {
            flex: 1; min-width: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(181, 148, 97, 0.3);
            padding: 12px 18px; border-radius: 25px; color: #fff; outline: none; user-select: text !important;
        }

        .send-btn {
            background: var(--accent-gold); border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div class="header-left">
            <a href="https://chat-room-three-pied.vercel.app/" class="home-btn">🏠</a>
            <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 1rem; letter-spacing: 0.5px;">Secure Chat</h2>
        </div>

        <div class="header-right">
            <div style="color: var(--accent-gold); font-size: 0.8rem;">👁️ <span id="online-count">0</span></div>
            <div class="user-info">
                <div class="btn-group" style="display: flex; gap: 5px;">
                    <button class="clear-btn" onclick="window.clearChat()">Clear</button>
                    <button class="logout-btn" onclick="window.logout()">Logout</button>
                </div>
                <span id="display-username" style="font-size: 0.65rem; color: #999;">@user</span>
            </div>
        </div>
    </header>

    <ul id="messages"></ul>
    
    <div id="typing-box"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" onclick="window.handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
