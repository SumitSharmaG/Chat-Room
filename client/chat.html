<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-card: #141414;
            --accent-gold: #b59461;
            --text-main: #e0e0e0;
            --transition-smooth: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(30, 20, 16, 0.4) 0px, transparent 50%);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        header {
            background: var(--bg-card);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(181, 148, 97, 0.2);
            height: 60px;
            flex-shrink: 0;
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 1.1rem; }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .online-status { color: var(--accent-gold); font-size: 0.9rem; font-weight: 600; }

        .logout-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.1);
        }

        #messages li {
            list-style: none;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px 15px 15px 2px;
            max-width: 85%;
            width: fit-content;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            word-wrap: break-word;
        }

        /* --- Standard WhatsApp Input Layout --- */
        .input-area {
            background: var(--bg-card);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(181, 148, 97, 0.1);
            width: 100%;
            flex-shrink: 0;
        }

        #msg {
            flex: 1;
            min-width: 0; /* Important: prevents pushing the button out */
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(181, 148, 97, 0.3);
            padding: 12px 18px;
            border-radius: 25px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
        }

        .send-btn {
            background: var(--accent-gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* Prevents button from shrinking */
            transition: var(--transition-smooth);
        }

        .send-btn:active { transform: scale(0.9); }

        footer { text-align: center; font-size: 0.6rem; padding: 3px; color: #444; background: var(--bg-card); }
    </style>
</head>
<body>

    <header>
        <h2>Chat Room</h2>
        <div class="header-right">
            <div class="online-status">👁️ <span id="online-count">0</span></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." autocomplete="off" />
        <button class="send-btn" onclick="handleSend()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <footer>©2026 SumitSharma.in</footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
